# VirtualHost para el Portal Ticket — ticket.verfrut.cl
# Copiar a: /etc/apache2/sites-available/ticket.verfrut.cl.conf
#
# El certificado wildcard *.verfrut.cl ya está instalado en este server (lo usa
# helpdesk.verfrut.cl) y cubre también ticket.verfrut.cl. REUTILIZA esas mismas
# rutas de certificado; míralas con:
#   sudo grep -ri "SSLCertificate" /etc/apache2/sites-available/ | grep -i helpdesk
# y pégalas abajo (SSLCertificateFile / SSLCertificateKeyFile / cadena).

<VirtualHost *:80>
    ServerName ticket.verfrut.cl
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:443>
    ServerName ticket.verfrut.cl

    # OJO: apunta a /public (nunca a la raíz del proyecto)
    DocumentRoot /var/www/ticket/public

    <Directory /var/www/ticket/public>
        AllowOverride All          # deja que el public/.htaccess de Laravel maneje el rewrite
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # --- PHP-FPM 8.4 (obligatorio para este portal; GLPI mantiene su propio FPM) ---
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost"
    </FilesMatch>
    # Si tu Apache usa mod_php, borra el bloque <FilesMatch> de arriba.

    # --- TLS: MISMAS rutas del wildcard *.verfrut.cl que ya usa helpdesk.verfrut.cl ---
    SSLEngine on
    SSLCertificateFile      /ruta/al/wildcard.verfrut.cl.crt
    SSLCertificateKeyFile   /ruta/al/wildcard.verfrut.cl.key
    # Si helpdesk usa una línea de cadena aparte, cópiala también:
    #SSLCertificateChainFile /ruta/al/ca-bundle.crt

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Strict-Transport-Security "max-age=31536000"

    ErrorLog  ${APACHE_LOG_DIR}/ticket-error.log
    CustomLog ${APACHE_LOG_DIR}/ticket-access.log combined
</VirtualHost>
