# VirtualHost para el Portal Ticket — ticket.unifrutti.com
# Copiar a: /etc/apache2/sites-available/ticket.unifrutti.com.conf
# Ajusta las rutas del certificado y la versión de PHP-FPM a las de tu server.

<VirtualHost *:80>
    ServerName ticket.unifrutti.com
    # Todo el tráfico HTTP se redirige a HTTPS
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:443>
    ServerName ticket.unifrutti.com

    # OJO: apunta a /public (nunca a la raíz del proyecto)
    DocumentRoot /var/www/ticket/public

    <Directory /var/www/ticket/public>
        AllowOverride All          # deja que el public/.htaccess de Laravel maneje el rewrite
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # --- PHP-FPM 8.4 (obligatorio para este portal) ---
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost"
    </FilesMatch>
    # Si tu Apache usa mod_php en vez de PHP-FPM, borra el bloque <FilesMatch> de arriba;
    # mod_php procesa los .php automáticamente.

    # --- TLS (tu certificado de unifrutti.com) ---
    SSLEngine on
    SSLCertificateFile      /etc/ssl/unifrutti/ticket.unifrutti.com.crt
    SSLCertificateKeyFile   /etc/ssl/unifrutti/ticket.unifrutti.com.key
    # Cadena intermedia (CA bundle). En Apache >= 2.4.8 puedes en su lugar
    # concatenar la intermedia dentro del .crt y omitir esta línea.
    SSLCertificateChainFile /etc/ssl/unifrutti/ticket.unifrutti.com.ca-bundle

    # Cabeceras de seguridad básicas
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Strict-Transport-Security "max-age=31536000"

    ErrorLog  ${APACHE_LOG_DIR}/ticket-error.log
    CustomLog ${APACHE_LOG_DIR}/ticket-access.log combined
</VirtualHost>
